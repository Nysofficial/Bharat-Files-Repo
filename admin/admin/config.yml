backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog Articles"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Tag", name: "tag", widget: "select", options: ["Netaji Studies", "History", "Youth", "Events", "Culture", "National Issues"] }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "research"
    label: "Research Papers"
    folder: "content/research"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Domain", name: "domain", widget: "select", options: ["Revolutionary Studies", "Sanatan & Heritage", "Current Affairs", "Defence & Geopolitics"] }
      - { label: "Abstract", name: "abstract", widget: "text" }
      - { label: "PDF Link", name: "url", widget: "string" }
